<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelClock</title>
<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; max-width: 480px; margin: 0 auto; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .header h1 { font-size: 1.5em; }
  .status { font-size: 0.75em; padding: 3px 10px; border-radius: 10px; }
  .on { background: #2ecc71; }
  .off { background: #e74c3c; }
  .connecting { background: #f39c12; }

  .card { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .card h2 { font-size: 0.85em; text-transform: uppercase; color: #8899cc; margin-bottom: 12px; letter-spacing: 1px; }

  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .row label { min-width: 60px; font-size: 0.85em; color: #bbb; }
  .row input[type="range"] { flex: 1; accent-color: #4a7cff; }
  .row .val { min-width: 35px; text-align: right; font-weight: bold; color: #4a7cff; font-size: 0.9em; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid2 input { background: #0f3460; border: 1px solid #1a4a8a; color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 0.9em; width: 100%; }
  .grid2 input:focus { outline: none; border-color: #4a7cff; }
  .grid2 label { display: block; font-size: 0.75em; color: #667; margin-bottom: 4px; }

  .grad-select { display: flex; gap: 8px; }
  .grad-select label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.85em; color: #ddd; background: #0f3460; padding: 8px 14px; border-radius: 8px; border: 2px solid transparent; }
  .grad-select label:has(input:checked) { border-color: #4a7cff; }
  .grad-select input:checked + span { color: #4a7cff; font-weight: bold; }

  .status-box { background: #0f3460; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 0.8em; line-height: 1.6; color: #88aacc; min-height: 50px; }

  button { background: #4a7cff; color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer; width: 100%; }
  button:hover { background: #3a6aee; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .footer { text-align: center; font-size: 0.75em; color: #556; margin-top: 16px; }
</style>
</head>
<body>

<div class="header">
  <h1>☀ PixelClock</h1>
  <span id="connStatus" class="status off">Desconectado</span>
</div>

<div class="card">
  <h2>Brillo</h2>
  <div class="row"><label>Día</label><input type="range" id="brilloDia" min="0" max="255" oninput="upd(this)"><span class="val" id="brilloDiaVal">40</span></div>
  <div class="row"><label>Noche</label><input type="range" id="brilloNoche" min="0" max="255" oninput="upd(this)"><span class="val" id="brilloNocheVal">1</span></div>
</div>

<div class="card">
  <h2>Horario noche</h2>
  <div class="grid2">
    <div><label>Inicio</label><input type="number" id="inicioNoche" min="0" max="23"></div>
    <div><label>Fin</label><input type="number" id="finNoche" min="0" max="23"></div>
  </div>
</div>

<div class="card">
  <h2>Gradiente</h2>
  <div class="grad-select">
    <label><input type="radio" name="grad" value="0"><span>Cian → Rojo</span></label>
    <label><input type="radio" name="grad" value="1"><span>Amarillo → Rojo</span></label>
  </div>
</div>

<div class="card">
  <h2>Gradiente nocturno</h2>
  <div class="grad-select">
    <label><input type="radio" name="gradNoche" value="0"><span>Cian → Rojo</span></label>
    <label><input type="radio" name="gradNoche" value="1"><span>Amarillo → Rojo</span></label>
    <label><input type="radio" name="gradNoche" value="2" checked><span>Azul tenue</span></label>
  </div>
</div>

<div class="card">
  <h2>Fecha</h2>
  <div class="row"><label>Formato</label>
    <select id="formatoFecha" style="flex:1;background:#0f3460;color:#fff;border:1px solid #1a4a8a;padding:8px;border-radius:8px;">
      <option value="0">DD-MM-YYYY</option>
      <option value="1">DD/MM/YYYY</option>
      <option value="2">MM-DD-YYYY</option>
      <option value="3">YYYY-MM-DD</option>
    </select>
  </div>
  <div class="row"><label>Día</label>
    <select id="mostrarDia" style="flex:1;background:#0f3460;color:#fff;border:1px solid #1a4a8a;padding:8px;border-radius:8px;">
      <option value="1">Mostrar día de la semana</option>
      <option value="0">Ocultar día</option>
    </select>
  </div>
  <div class="row"><label>Marquee</label>
    <select id="marqueeActivo" style="flex:1;background:#0f3460;color:#fff;border:1px solid #1a4a8a;padding:8px;border-radius:8px;">
      <option value="1">Animado (entra/sale)</option>
      <option value="0">Oculto</option>
    </select>
  </div>
</div>

<div class="card">
  <h2>Clima</h2>
  <div class="grid2">
    <div><label>Latitud</label><input type="text" id="climaLat"></div>
    <div><label>Longitud</label><input type="text" id="climaLon"></div>
  </div>
  <div class="row" style="margin-top:10px;"><label>Refresco</label><input type="range" id="climaRefresh" min="5" max="120" oninput="upd(this)"><span class="val" id="climaRefreshVal">30 min</span></div>
</div>

<button id="saveBtn" onclick="send()" disabled>Guardar configuración</button>

<div class="card" style="margin-top:12px;">
  <h2>Estado actual</h2>
  <div class="status-box" id="statusBox">Esperando conexión...</div>
</div>

<div class="footer" id="lastUpd"></div>

<script>
const BROKER = 'ws://192.168.1.59:9001/mqtt';
const USER = 'pixelclock';
const PASS = 'pixelclock';

let client = null;

function upd(el) {
  const l = document.getElementById(el.id + 'Val');
  if (l) l.textContent = el.id === 'climaRefresh' ? el.value + ' min' : el.value;
}

function setStatus(st, txt) {
  const el = document.getElementById('connStatus');
  el.textContent = txt;
  el.className = 'status ' + st;
  document.getElementById('saveBtn').disabled = (st !== 'on');
}

function connect() {
  setStatus('connecting', 'Conectando...');

  client = mqtt.connect(BROKER, {
    clientId: 'pixelclock_ui_' + Math.random().toString(16).substr(2, 8),
    username: USER, password: PASS, clean: true
  });

  client.on('connect', () => {
    setStatus('on', 'Conectado');
    client.subscribe('reloj/status');
  });

  client.on('message', (t, p) => {
    try {
      const d = JSON.parse(p.toString());
      const box = document.getElementById('statusBox');
      box.innerHTML = Object.entries(d).map(([k, v]) =>
        `<span style="color:#4a7cff;">${k}</span>: ${v}`
      ).join(' &nbsp; ');

      document.getElementById('lastUpd').textContent = 'Última actualización: ' + new Date().toLocaleTimeString();

      if (d.brillo_dia !== undefined) setVal('brilloDia', d.brillo_dia);
      if (d.brillo_noche !== undefined) setVal('brilloNoche', d.brillo_noche);
      if (d.inicio_noche !== undefined) document.getElementById('inicioNoche').value = d.inicio_noche;
      if (d.fin_noche !== undefined) document.getElementById('finNoche').value = d.fin_noche;
      if (d.gradiente !== undefined) document.querySelectorAll('input[name="grad"]').forEach(e => e.checked = e.value == d.gradiente);
      if (d.gradiente_noche !== undefined) document.querySelectorAll('input[name="gradNoche"]').forEach(e => e.checked = e.value == d.gradiente_noche);
      if (d.formato_fecha !== undefined) document.getElementById('formatoFecha').value = d.formato_fecha;
      if (d.mostrar_dia !== undefined) document.getElementById('mostrarDia').value = d.mostrar_dia;
      if (d.marquee_activo !== undefined) document.getElementById('marqueeActivo').value = d.marquee_activo;
      if (d.clima_lat !== undefined) document.getElementById('climaLat').value = d.clima_lat;
      if (d.clima_lon !== undefined) document.getElementById('climaLon').value = d.clima_lon;
      if (d.clima_refresh !== undefined) setVal('climaRefresh', d.clima_refresh);
    } catch(e) { document.getElementById('statusBox').textContent = 'Error: ' + e.message; }
  });

  client.on('error', () => setStatus('off', 'Error'));
  client.on('close', () => setTimeout(connect, 5000));
}

function setVal(id, v) {
  const el = document.getElementById(id);
  el.value = v;
  upd(el);
}

function send() {
  if (!client || !client.connected) return;
  const cfg = {
    brillo_dia: +document.getElementById('brilloDia').value,
    brillo_noche: +document.getElementById('brilloNoche').value,
    inicio_noche: +document.getElementById('inicioNoche').value,
    fin_noche: +document.getElementById('finNoche').value,
    gradiente: +document.querySelector('input[name="grad"]:checked').value,
    gradiente_noche: +document.querySelector('input[name="gradNoche"]:checked').value,
    formato_fecha: +document.getElementById('formatoFecha').value,
    mostrar_dia: +document.getElementById('mostrarDia').value,
    marquee_activo: +document.getElementById('marqueeActivo').value,
    clima_lat: +document.getElementById('climaLat').value,
    clima_lon: +document.getElementById('climaLon').value,
    clima_refresh: +document.getElementById('climaRefresh').value,
  };
  client.publish('reloj/config', JSON.stringify(cfg));
  const btn = document.getElementById('saveBtn');
  btn.textContent = '✓ Enviado';
  setTimeout(() => { btn.textContent = 'Guardar configuración'; }, 2000);
}

connect();
</script>
</body>
</html>
